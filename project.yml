name: PollenSymptomTracker
options:
  bundleIdPrefix: com.pollenhealth
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  PollenSymptomTracker:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Resources
    resources:
      - path: Resources/SubscriptionConfig.json
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.pollenhealth.symptomtracker
        PRODUCT_NAME: "Pollen Tracker"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Pollen Tracker needs notifications to remind you to log symptoms and alert you to high pollen levels."

  PollenSymptomTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PollenSymptomTrackerTests
    dependencies:
      - target: PollenSymptomTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollenhealth.symptomtracker.tests
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
