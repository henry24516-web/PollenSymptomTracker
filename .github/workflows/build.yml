name: Build iOS App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer

jobs:
  build:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already installed"
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Check if Podfile exists
        id: check_pods
        run: |
          if [ -f "Podfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install CocoaPods dependencies
        if: steps.check_pods.outputs.exists == 'true'
        run: pod install
        working-directory: .

      - name: Build the project (Debug)
        run: |
          xcodebuild -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Build the project (Release)
        run: |
          xcodebuild -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            build
