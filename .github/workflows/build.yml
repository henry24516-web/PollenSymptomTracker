name: Build iOS App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer

jobs:
  build:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already installed"
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache CocoaPods dependencies
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Check if Podfile exists
        id: check_pods
        run: |
          if [ -f "Podfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install CocoaPods dependencies
        if: steps.check_pods.outputs.exists == 'true'
        run: pod install
        working-directory: .

      - name: Build the project (Debug)
        run: |
          xcodebuild -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Debug \
            -destination "platform=iOS Simulator"
            build

      - name: Build the project (Release)
        run: |
          xcodebuild -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Release \
            -destination "platform=iOS Simulator"
            build

  test:
    name: Run Unit Tests
    runs-on: macos-15
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache CocoaPods dependencies
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Check if Podfile exists
        id: check_pods
        run: |
          if [ -f "Podfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install CocoaPods dependencies
        if: steps.check_pods.outputs.exists == 'true'
        run: pod install
        working-directory: .

      - name: Run unit tests
        run: |
          xcodebuild -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Debug \
            -destination "platform=iOS Simulator"
            test

  archive:
    name: Build for Archive (Requires Secrets)
    runs-on: macos-15
    needs: [build, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode the certificate
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o $CERTIFICATE_PATH

          # Create a new keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up API key for App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_KEY" | base64 --decode -o ~/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8

      - name: Build for App Store (IPA)
        env:
          PRODUCT_BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_ID }}
        run: |
          xcodebuild -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Release \
            -archivePath build/PollenSymptomTracker.xcarchive \
            -destination "platform=iOS Simulator"
            archive

      - name: Export to IPA
        env:
          PRODUCT_BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_ID }}
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
        run: |
          if [ -n "$APP_STORE_API_KEY" ]; then
            # Using App Store Connect API Key auth
            xcodebuild -exportArchive \
              -archivePath build/PollenSymptomTracker.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build/PollenSymptomTracker.ipa
          else
            # Using xcodebuild with manual export
            xcodebuild -exportArchive \
              -archivePath build/PollenSymptomTracker.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build/PollenSymptomTracker.ipa
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PollenSymptomTracker.ipa
          path: build/PollenSymptomTracker.ipa
          retention-days: 30
