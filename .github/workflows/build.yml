name: Build iOS App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


        run: xcodebuild -version

        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          else
          fi

        run: xcodegen generate

      - name: Check if Podfile exists
        id: check_pods
        run: |
          if [ -f "Podfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install CocoaPods dependencies
        if: steps.check_pods.outputs.exists == 'true'
        run: pod install
        working-directory: .

      - name: Build the project (Debug)
        run: |
          xcodebuild CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            build

      - name: Build the project (Release)
        run: |
          xcodebuild CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -project PollenSymptomTracker.xcodeproj \
            -scheme PollenSymptomTracker \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build
